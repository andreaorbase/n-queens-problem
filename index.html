<!DOCTYPE html>
<html>
<head>
    <title>n-Queens Problem Solver</title>
    <style>
        body {
            background-color: #333533;
            color: white;
            text-align: center;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #boardDisplay {
            margin-top: 20px;
        }
        .board {
            display: inline-grid;
            border: 2px solid #333;
            margin-bottom: 20px;
        }
        .cell {
            width: 40px; 
            height: 40px; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>n-Queens Problem Solver</h1>
        <p>Enter (n) dimension:</p>
    <div>
        <input type="number" id="sizeInput" value="8" min="1">
        <button onclick="runSolver()">Solve</button>
        <button id="nextBtn" onclick="showNext()" style="display:none;">Show Another Solution</button>
    </div>

    <p id="stats"></p>
    <div id="boardDisplay"></div>

    <script>
        let currentN = 0;

        function runSolver() {
            const n = parseInt(document.getElementById('sizeInput').value);
            currentN = n;
            const result = solve(n);
            
            if (result) {
                document.getElementById('boardDisplay').innerHTML = result.display;
                document.getElementById('stats').innerText = result.isEstimate 
                    ? "Estimated Solutions: " + result.count 
                    : "Total Solutions Found: " + result.count;
                
                if (currentN > 8) {
                    document.getElementById('nextBtn').style.display = "inline";
                } else {
                    document.getElementById('nextBtn').style.display = "none";
                }
            } else {
                document.getElementById('boardDisplay').innerText = "No solution found.";
                document.getElementById('stats').innerText = "";
                document.getElementById('nextBtn').style.display = "none";
            }
        }

        function showNext() {
            const solution = solveMinConflicts(currentN);
            document.getElementById('boardDisplay').innerHTML = generateHTMLBoard(solution);
        }

        function solve(n) {
            if (n >= 1 && n <= 8) {
                let currentSolutions = solveBacktracking(n);
                if (currentSolutions.length === 0) return null;
                
                let allBoardsDisplay = currentSolutions.map((sol, index) => 
                    "<h3>Solution " + (index + 1) + ":</h3>" + generateHTMLBoard(sol)
                ).join("");

                return { 
                    display: allBoardsDisplay, 
                    count: currentSolutions.length,
                    isEstimate: false 
                };
            } else if (n > 8) {
                const solution = solveMinConflicts(n);
                const estimate = Math.pow(n * Math.exp(-1.942), n);
                return { 
                    display: generateHTMLBoard(solution), 
                    count: estimate.toExponential(2), 
                    isEstimate: true 
                };
            }
            return null;
        }

        function solveBacktracking(n) {
            const solutions = [];
            const board = new Array(n).fill(-1);

            function isSafe(row, col) {
                for (let i = 0; i < row; i++) {
                    if (board[i] === col || Math.abs(board[i] - col) === Math.abs(i - row)) return false;
                }
                return true;
            }

            function backtrack(row) {
                if (row === n) {
                    solutions.push([...board]);
                    return;
                }
                for (let col = 0; col < n; col++) {
                    if (isSafe(row, col)) {
                        board[row] = col;
                        backtrack(row + 1);
                        board[row] = -1;
                    }
                }
            }
            backtrack(0);
            return solutions;
        }

        function solveMinConflicts(n, maxSteps = 1000) {
            let queens = Array.from({length: n}, (_, i) => i);
            for (let i = n - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [queens[i], queens[j]] = [queens[j], queens[i]];
            }

            function getConflicts(row, col) {
                let count = 0;
                for (let i = 0; i < n; i++) {
                    if (i === row) continue;
                    if (queens[i] === col || Math.abs(queens[i] - col) === Math.abs(i - row)) count++;
                }
                return count;
            }

            for (let step = 0; step < maxSteps; step++) {
                let conflicted = [];
                for (let i = 0; i < n; i++) {
                    if (getConflicts(i, queens[i]) > 0) conflicted.push(i);
                }
                if (conflicted.length === 0) return queens;

                let row = conflicted[Math.floor(Math.random() * conflicted.length)];
                let minConf = n, bestCols = [];
                for (let col = 0; col < n; col++) {
                    let c = getConflicts(row, col);
                    if (c < minConf) { minConf = c; bestCols = [col]; }
                    else if (c === minConf) { bestCols.push(col); }
                }
                queens[row] = bestCols[Math.floor(Math.random() * bestCols.length)];
            }
            return solveMinConflicts(n); 
        }

        function generateHTMLBoard(queens) {
            let n = queens.length;
            let html = `<div class="board" style="grid-template-columns: repeat(${n}, 40px);">`;
            
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    let isWhite = (i + j) % 2 === 0;
                    let hasQueen = queens[i] === j;
                    let imageSrc = "";

                    if (isWhite && hasQueen) {
                        imageSrc = "src/queen_in_white.png";
                    } else if (!isWhite && hasQueen) {
                        imageSrc = "src/queen_in_black.png";
                    } else if (isWhite && !hasQueen) {
                        imageSrc = "src/white_square.png";
                    } else {
                        imageSrc = "src/black_square.png";
                    }
                    
                    html += `<div class="cell"><img src="${imageSrc}" style="width: 100%; height: 100%; display: block;"></div>`;
                }
            }
            html += `</div>`;
            return html;
        }
    </script>
</body>
</html>
